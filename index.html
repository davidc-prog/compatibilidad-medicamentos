<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Compatibilidad IV</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #eef2f7;
  margin: 0;
}

.header {
  background: #1e3a5f;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

.container {
  max-width: 500px;
  margin: 40px auto;
}

.card {
  background: white;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 20px;
  background: #1e3a5f;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
}

.result {
  text-align: center;
  font-size: 24px;
  margin-top: 25px;
  font-weight: bold;
}

.compatible {
  color: #1b8a3a;
}

.incompatible {
  color: #c0392b;
}

.nodata {
  color: #d68910;
}

.footer {
  text-align: center;
  font-size: 12px;
  margin-top: 15px;
  color: gray;
}
</style>
</head>

<body>

<div class="header">
Sistema de Compatibilidad IV
</div>

<div class="container">
  <div class="card">

    <input list="drugs" id="drug1" placeholder="Medicamento 1">
    <input list="drugs" id="drug2" placeholder="Medicamento 2">

    <datalist id="drugs"></datalist>

    <button onclick="check()">Ver compatibilidad</button>

    <div id="result" class="result"></div>

    <div class="footer">
      ⚠️ Validar siempre con farmacia clínica <br>
      Referencias: NHS / Stabilis
    </div>

  </div>
</div>

<script>

// 🔥 PEGA AQUÍ TU JSON COMPLETO
const database = [
  { "key": "ceftriaxona-vancomicina"; "result": "incompatible" },
{ "key": "dopamina-furosemida"; "result": "compatible" },
{ "key": "fentanilo-midazolam"; "result": "compatible" },
{ "key": "heparina-noradrenalina"; "result": "precaucion" },
{ "key": "furosemida-insulina"; "result": "incompatible" }
];

// GENERAR LISTA
const drugSet = new Set();
database.forEach(item => {
  const [a, b] = item.key.split("-");
  drugSet.add(a);
  drugSet.add(b);
});

const datalist = document.getElementById("drugs");
drugSet.forEach(drug => {
  const option = document.createElement("option");
  option.value = drug;
  datalist.appendChild(option);
});

// NORMALIZAR
function normalizeKey(a, b) {
  return [a.toLowerCase(), b.toLowerCase()].sort().join("-");
}

// VALIDAR
function check() {
  const d1 = document.getElementById("drug1").value.trim().toLowerCase();
  const d2 = document.getElementById("drug2").value.trim().toLowerCase();
  const resultDiv = document.getElementById("result");

  if (!d1 || !d2) {
    resultDiv.innerHTML = "⚠️ Ingresa ambos medicamentos";
    resultDiv.className = "result nodata";
    return;
  }

  const key = normalizeKey(d1, d2);
  const found = database.find(item => item.key === key);

  if (!found) {
    resultDiv.innerHTML = "🟡 Sin datos";
    resultDiv.className = "result nodata";
    return;
  }

  if (found.result === "compatible") {
    resultDiv.innerHTML = "🟢 Compatible";
    resultDiv.className = "result compatible";
  } else {
    resultDiv.innerHTML = "🔴 Incompatible";
    resultDiv.className = "result incompatible";
  }
}

</script>

</body>
</html>
